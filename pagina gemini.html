<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fallas ALUMBRADO IMC</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  body, html { height: 100%; margin: 0; padding: 0; background: #0f172a; color: #e2e8f0; overflow: hidden; }
  
  .text-alumbrado { color: #7cb342; } 
  .text-imc { color: #fbb005; }      
  
  /* Contenedores Principales */
  .app-container { display: flex; flex-direction: column; height: 100vh; width: 100%; }
  .main-content { flex: 1; display: flex; position: relative; overflow: hidden; }
  
  /* Ajuste de Vistas en Móvil */
  #map { height: 100%; width: 100%; z-index: 1; background: #1e293b; }
  
  .glass { background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(148, 163, 184, 0.15); }
  .scroll-y { overflow-y: auto; scrollbar-width: thin; -webkit-overflow-scrolling: touch; }

  /* Leyendas adaptadas */
  .legend-box { position: absolute; z-index: 1000; background: rgba(15, 23, 42, 0.95); padding: 8px; border-radius: 10px; font-size: 9px; pointer-events: none; }
  .legend-falla { bottom: 80px; left: 10px; }
  .legend-situacion { bottom: 80px; right: 10px; max-width: 140px; display: none; } /* Oculta en movil por defecto */

  @media (min-width: 1024px) {
    .legend-situacion { display: block; }
  }

  /* Nav Inferior Móvil */
  .mobile-nav { display: flex; position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background: #1e293b; border-top: 1px solid #334155; z-index: 5000; }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: #94a3b8; }
  .nav-btn.active { color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
  .nav-btn svg { width: 24px; height: 24px; margin-bottom: 2px; }

  /* Ocultar vistas */
  .view-panel { position: absolute; inset: 0; z-index: 10; display: none; background: #0f172a; }
  .view-panel.active { display: flex; flex-direction: column; }
  
  @media (min-width: 1024px) {
    .mobile-nav { display: none; }
    .view-panel { position: relative; display: flex !important; width: 400px; inset: auto; border-right: 1px solid #334155; }
    #map-container { flex: 1; position: relative; }
    #detailPanel { position: absolute; right: 0; width: 350px; height: 100%; z-index: 2000; border-left: 1px solid #334155; }
  }

  .btn-primary { background: #3b82f6; color: white; font-weight: bold; padding: 12px; border-radius: 10px; }
  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; padding: 12px 20px; border-radius: 10px; background: #10b981; color: white; font-size: 13px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
</style>
</head>
<body>

<!-- Login -->
<div id="loginOverlay" class="fixed inset-0 z-[100000] bg-slate-900 flex items-center justify-center p-6">
    <div class="bg-slate-800 p-8 rounded-3xl border border-slate-700 w-full max-w-sm shadow-2xl text-center">
        <h1 class="text-3xl font-black uppercase tracking-tighter mb-1">
            <span class="text-alumbrado">ALUMBRADO</span> <span class="text-imc">IMC</span>
        </h1>
        <p class="text-slate-500 text-sm mb-8 font-bold">GESTIÓN DE FALLAS</p>
        <form onsubmit="handleLogin(event)" class="space-y-4">
            <input type="text" id="username" placeholder="Usuario" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-white outline-none focus:border-lime-500">
            <input type="password" id="password" placeholder="Contraseña" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-white outline-none focus:border-lime-500">
            <button type="submit" class="btn-primary w-full shadow-xl uppercase tracking-widest">Ingresar</button>
        </form>
        <p id="loginError" class="text-red-500 text-xs mt-4 hidden font-bold">⚠️ Credenciales incorrectas</p>
    </div>
</div>

<!-- App Principal -->
<div id="mainContent" class="hidden app-container">
    <!-- Header Compacto -->
    <header class="glass border-b border-slate-700/50 px-4 py-3 flex items-center justify-between z-20">
        <div class="flex items-center">
            <h1 class="text-lg font-black tracking-tighter">
                <span class="text-alumbrado">ALUMBRADO</span> <span class="text-imc">IMC</span>
            </h1>
        </div>
        <div class="flex gap-2">
            <button onclick="document.getElementById('fileInput').click()" class="bg-blue-600 p-2 rounded-lg text-white" title="Cargar CSV">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            </button>
            <button onclick="logout()" class="bg-red-600/20 text-red-500 p-2 rounded-lg" title="Salir">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
            </button>
            <input type="file" id="fileInput" accept=".csv" class="hidden" onchange="handleFile(event)">
        </div>
    </header>

    <div class="main-content">
        <!-- VISTA 1: LISTA Y FILTROS -->
        <aside id="listView" class="view-panel active scroll-y p-4 pb-20">
            <div class="grid grid-cols-2 gap-2 mb-4">
                <div class="bg-slate-800/50 p-3 rounded-xl border border-slate-700 text-center">
                    <div class="text-[10px] text-slate-500 font-bold uppercase">Total</div>
                    <div id="statTotal" class="text-xl font-black">0</div>
                </div>
                <div class="bg-red-500/10 p-3 rounded-xl border border-red-500/20 text-center">
                    <div class="text-[10px] text-red-400 font-bold uppercase">Sin Energía</div>
                    <div id="statNoEnergy" class="text-xl font-black text-red-500">0</div>
                </div>
            </div>

            <div class="space-y-3 mb-6">
                <input type="text" id="searchInput" placeholder="Buscar ID..." class="w-full bg-slate-800 border border-slate-700 p-3 rounded-xl text-sm text-white outline-none">
                <div class="grid grid-cols-2 gap-2">
                    <select id="localidadFilter" class="bg-slate-800 border border-slate-700 p-2 rounded-lg text-xs"><option value="all">MUNICIPIO</option></select>
                    <select id="tipoFallaFilter" class="bg-slate-800 border border-slate-700 p-2 rounded-lg text-xs"><option value="all">FALLA</option></select>
                </div>
            </div>

            <div id="errorList" class="space-y-2">
                <p class="text-center text-slate-500 py-10">Cargue un archivo CSV para ver las fallas.</p>
            </div>
        </aside>

        <!-- VISTA 2: MAPA -->
        <main id="mapView" class="view-panel">
            <div id="map"></div>
            <div class="legend-box legend-falla" id="legendFallas"></div>
        </main>

        <!-- VISTA 3: DETALLE -->
        <aside id="detailPanel" class="view-panel scroll-y p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-bold uppercase text-sm">Información del Activo</h2>
                <button onclick="switchView('list')" class="text-slate-400">Cerrar ✕</button>
            </div>
            <div id="detailContent" class="space-y-4">
                <p class="text-slate-500">Seleccione un activo de la lista o el mapa.</p>
            </div>
        </aside>
    </div>

    <!-- Navegación Móvil -->
    <nav class="mobile-nav">
        <button onclick="switchView('list')" id="nav-list" class="nav-btn active">
            <svg fill="currentColor" viewBox="0 0 20 20"><path d="M3 4h14v2H3V4zm0 4h14v2H3V8zm0 4h14v2H3v-2zm0 4h14v2H3v-2z"/></svg>
            <span>LISTA</span>
        </button>
        <button onclick="switchView('map')" id="nav-map" class="nav-btn">
            <svg fill="currentColor" viewBox="0 0 20 20"><path d="M10 2l6 4v8l-6 4-6-4V6l6-4z"/></svg>
            <span>MAPA</span>
        </button>
        <button onclick="switchView('stats')" id="nav-stats" class="nav-btn">
            <svg fill="currentColor" viewBox="0 0 20 20"><path d="M2 11h2v6H2v-6zm4-4h2v10H6V7zm4-3h2v13h-2V4zm4 4h2v9h-2V8z"/></svg>
            <span>STATS</span>
        </button>
    </nav>
</div>

<!-- Modal Estadísticas -->
<div id="statsModal" class="modal-overlay hidden">
    <div class="modal-content">
        <div class="flex justify-between items-center mb-6 border-b border-slate-700 pb-4">
            <h2 class="text-xl font-bold">📊 Estadísticas</h2>
            <button onclick="closeStats()" class="text-2xl">✕</button>
        </div>
        <div class="grid grid-cols-1 gap-4">
            <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-700">
                <h3 class="text-xs font-bold text-slate-500 uppercase mb-4">Municipios Críticos</h3>
                <div class="overflow-x-auto">
                    <table class="data-table w-full">
                        <thead><tr><th>Municipio</th><th>Total</th></tr></thead>
                        <tbody id="municipioStatsBody"></tbody>
                    </table>
                </div>
            </div>
            <button onclick="exportToPDF()" class="bg-amber-600 text-white p-3 rounded-xl font-bold uppercase text-xs">Exportar Listado PDF</button>
        </div>
    </div>
</div>

<div id="toastContainer"></div>

<script>
// --- CORE CONFIG ---
let users = [{ name: 'admin', pass: 'admin123', role: 'admin' }];
let allData = [];
let filteredData = [];
let map = null;
let markers = [];

const FALLA_TYPES = {
    'Sin energía': '#ef4444',
    'OLC inaccesible': '#f97316',
    'GPS roto': '#eab308',
    'Otros': '#64748b'
};

// --- NAVEGACIÓN ---
function switchView(view) {
    // Desactivar todo
    document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

    if (view === 'list') {
        document.getElementById('listView').classList.add('active');
        document.getElementById('nav-list').classList.add('active');
    } else if (view === 'map') {
        document.getElementById('mapView').classList.add('active');
        document.getElementById('nav-map').classList.add('active');
        setTimeout(() => { if(map) map.invalidateSize(); }, 200);
    } else if (view === 'detail') {
        document.getElementById('detailPanel').classList.add('active');
    } else if (view === 'stats') {
        document.getElementById('statsModal').classList.remove('hidden');
        updateStatsView();
    }
}

function closeStats() { document.getElementById('statsModal').classList.add('hidden'); }

// --- AUTH ---
function handleLogin(e) {
    e.preventDefault();
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value.trim();
    if(u === 'admin' && p === 'admin123') {
        sessionStorage.setItem('imc_active', 'true');
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainContent').classList.remove('hidden');
        initMap();
    } else {
        document.getElementById('loginError').classList.remove('hidden');
    }
}

function logout() { sessionStorage.clear(); location.reload(); }

// --- MAPA ---
function initMap() {
    if (map) return;
    map = L.map('map', { zoomControl: false }).setView([-34.75, -56.0], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© IMC' }).addTo(map);
    
    // Leyenda de fallas
    document.getElementById('legendFallas').innerHTML = Object.entries(FALLA_TYPES).map(([name, color]) => `
        <div class="flex items-center gap-2 mb-1">
            <span style="background:${color}" class="w-2 h-2 rounded-full"></span>
            <span class="text-white">${name}</span>
        </div>
    `).join('');
}

function renderMarkers() {
    if(!map) return;
    markers.forEach(m => map.removeLayer(m));
    markers = [];
    const bounds = [];
    filteredData.forEach(row => {
        if (!isNaN(row.lat)) {
            const m = L.circleMarker([row.lat, row.lng], {
                radius: 8, fillColor: row.categoria.color, color: '#fff', weight: 1, fillOpacity: 0.9
            }).addTo(map);
            m.on('click', () => {
                selectAsset(row.id);
                switchView('detail');
            });
            markers.push(m);
            bounds.push([row.lat, row.lng]);
        }
    });
    if (bounds.length > 0) map.fitBounds(bounds, {padding: [30, 30]});
}

// --- DATOS ---
function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
        const lines = ev.target.result.trim().split(/\r?\n/);
        allData = [];
        for (let i = 1; i < lines.length; i++) {
            const row = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            if (row.length < 13) continue;
            let lat = row[7].replace(',', '.').replace(/"/g, '').trim();
            let lng = row[8].replace(',', '.').replace(/"/g, '').trim();
            const obj = {
                'id': row[1].trim(), 'mensaje': row[2].trim(), 'fecha': row[3].trim(),
                'external': row[6].trim(), 'lat': parseFloat(lat), 'lng': parseFloat(lng),
                'localidad': (row[10] || "SIN MUNICIPIO").trim(), 
                'situacion': (row[12] || "NORMAL").trim(),
                'cuenta': (row[13] || "-").replace(/"/g, '').trim()
            };
            
            const m = obj.mensaje.toLowerCase();
            if (m.includes('energía')) obj.categoria = { name: 'Sin energía', color: '#ef4444' };
            else if (m.includes('accesible')) obj.categoria = { name: 'OLC inaccesible', color: '#f97316' };
            else if (m.includes('gps')) obj.categoria = { name: 'GPS roto', color: '#eab308' };
            else obj.categoria = { name: 'Otros', color: '#64748b' };

            allData.push(obj);
        }
        filteredData = [...allData];
        populateFilters();
        applyFilters();
        showToast('DATOS CARGADOS ✅');
    };
    reader.readAsText(file);
}

function applyFilters() {
    const s = document.getElementById('searchInput').value.toLowerCase();
    const fLoc = document.getElementById('localidadFilter').value;
    const fTipo = document.getElementById('tipoFallaFilter').value;

    filteredData = allData.filter(d => {
        return (!s || d.external.toLowerCase().includes(s) || d.id.toLowerCase().includes(s)) &&
               (fLoc === 'all' || d.localidad === fLoc) &&
               (fTipo === 'all' || d.categoria.name === fTipo);
    });

    document.getElementById('statTotal').textContent = filteredData.length;
    document.getElementById('statNoEnergy').textContent = filteredData.filter(x => x.categoria.name === 'Sin energía').length;
    
    renderMarkers();
    renderList();
}

function renderList() {
    const c = document.getElementById('errorList');
    c.innerHTML = filteredData.slice(0, 100).map(row => `
        <div class="p-4 bg-slate-800/60 rounded-2xl mb-2 border border-slate-700 shadow-sm" onclick="selectAsset('${row.id}'); switchView('detail');">
            <div class="flex justify-between items-start mb-2">
                <span class="text-[10px] font-bold text-blue-400 bg-blue-500/10 px-2 py-0.5 rounded-full uppercase">${row.localidad}</span>
                <span class="text-[10px] text-slate-500 font-mono">${row.fecha.split(' ')[0]}</span>
            </div>
            <div class="text-sm font-bold text-white mb-1">${row.external}</div>
            <div class="text-xs font-medium" style="color: ${row.categoria.color}">${row.categoria.name}</div>
        </div>
    `).join('');
}

function selectAsset(id) {
    const row = allData.find(x => x.id === id);
    if (!row) return;
    document.getElementById('detailContent').innerHTML = `
        <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700">
            <div class="text-[10px] text-slate-500 font-bold uppercase mb-1">ID Externo / Asset</div>
            <div class="text-xl font-black text-white mb-4">${row.external}</div>
            
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div><div class="text-[10px] text-slate-500 font-bold uppercase">Municipio</div><div class="text-white font-medium">${row.localidad}</div></div>
                <div><div class="text-[10px] text-slate-500 font-bold uppercase">Cuenta</div><div class="text-white font-mono text-xs">${row.cuenta}</div></div>
            </div>

            <div class="bg-slate-900/50 p-4 rounded-xl mb-4 border border-slate-700">
                <div class="text-[10px] text-slate-500 font-bold uppercase mb-1">Falla Detectada</div>
                <div class="font-bold" style="color:${row.categoria.color}">${row.categoria.name}</div>
                <div class="text-[11px] text-slate-400 mt-2 italic leading-tight">${row.mensaje}</div>
            </div>

            <div class="bg-lime-500/10 p-4 rounded-xl border border-lime-500/20">
                <div class="text-[10px] text-lime-500 font-bold uppercase mb-1">Situación Actual</div>
                <div class="text-sm text-lime-400 font-bold uppercase">${row.situacion}</div>
            </div>

            <button onclick="switchView('map'); map.flyTo([${row.lat}, ${row.lng}], 18);" class="w-full mt-6 btn-primary shadow-lg flex items-center justify-center gap-2">
                <span>📍 VER EN EL MAPA</span>
            </button>
        </div>
    `;
}

function updateStatsView() {
    const munStats = {};
    filteredData.forEach(d => {
        munStats[d.localidad] = (munStats[d.localidad] || 0) + 1;
    });
    document.getElementById('municipioStatsBody').innerHTML = Object.entries(munStats)
        .sort((a,b) => b[1] - a[1])
        .map(([l, c]) => `<tr><td class="py-2">${l}</td><td class="text-right font-bold text-blue-400">${c}</td></tr>`).join('');
}

function populateFilters() {
    const locs = [...new Set(allData.map(d => d.localidad))].sort();
    const fallas = [...new Set(allData.map(d => d.categoria.name))].sort();
    document.getElementById('localidadFilter').innerHTML = `<option value="all">TODOS</option>` + locs.map(x => `<option value="${x}">${x}</option>`).join('');
    document.getElementById('tipoFallaFilter').innerHTML = `<option value="all">TODAS</option>` + fallas.map(x => `<option value="${x}">${x}</option>`).join('');
}

function exportToPDF() {
    if (filteredData.length === 0) return;
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('l');
    doc.setFontSize(16);
    doc.text("REPORTE DE FALLAS ALUMBRADO IMC", 14, 15);
    const rows = filteredData.map((d, i) => [i+1, d.external, d.localidad, d.categoria.name, d.situacion, d.cuenta]);
    doc.autoTable({ head: [['#', 'ID', 'Municipio', 'Falla', 'Situación', 'Cuenta']], body: rows, startY: 22, styles: { fontSize: 8 } });
    doc.save(`Fallas_Alumbrado.pdf`);
}

function showToast(m) {
    const t = document.createElement('div'); t.className='toast'; t.textContent=m;
    document.getElementById('toastContainer').appendChild(t); setTimeout(()=>t.remove(), 3000);
}

// Eventos
document.getElementById('searchInput').addEventListener('input', applyFilters);
document.getElementById('localidadFilter').addEventListener('change', applyFilters);
document.getElementById('tipoFallaFilter').addEventListener('change', applyFilters);

window.onload = () => { if(sessionStorage.getItem('imc_active')) { document.getElementById('loginOverlay').style.display = 'none'; document.getElementById('mainContent').classList.remove('hidden'); initMap(); } };
</script>
</body>
</html>
